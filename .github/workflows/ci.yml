# CI de tous les jours — sobre par CONCEPTION, pas par contrainte.
#
# ⚠️ LEÇON PAYÉE (2026-07-22) : la première version faisait tourner la suite
# complète sur ubuntu ET windows, en deux passes (défaut puis --all-features).
# Coût réel mesuré : ~85 minutes FACTURÉES par run, dont ~56 pour le seul job
# Windows — GitHub compte les minutes Windows **au double** sur un dépôt privé.
# 23 runs ont suffi à épuiser le quota mensuel, et plus aucun job ne démarrait.
#
# Le dépôt est PUBLIC depuis, donc les minutes sont redevenues gratuites et la
# contrainte a disparu. **On garde cette architecture quand même** : une CI qui
# rend son verdict en ~20 minutes est meilleure qu'une CI qui met une heure et
# demie, indépendamment de son prix. La gratuité n'est pas une raison de faire
# attendre celui qui relit.
#
# Architecture retenue :
#   - ici (chaque PR, chaque push)  : Ubuntu seul, une passe de tests   → ~20 min
#   - lourd.yml (hebdomadaire)      : Windows, fuzzing, benchs de preuve
#
# Ce qu'on perd : la vérification Windows à chaque PR. Acceptable — le
# développement se fait SOUS Windows, donc le code y est compilé et testé en
# permanence en local ; la CI Windows était une redondance, pas un filet.
# Elle reste dans l'hebdomadaire pour attraper ce que le local raterait.
name: ci

on:
  push:
    branches: [master]
  pull_request:

# Un push qui remplace un autre annule le run précédent : inutile de payer pour
# vérifier un commit déjà dépassé.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Les trois contrôles rapides tiennent dans un seul job : trois runners qui
  # démarrent, c'est trois fois le coût fixe de démarrage et de cache pour
  # quelques secondes de travail utile.
  rapide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: format
        run: cargo fmt --all --check

      # Passe PAR DÉFAUT d'abord : elle garde l'invariant « build nu = surface
      # consensus seule ». Un warning qui n'apparaît qu'ici est un warning du
      # chemin de consensus.
      - name: clippy (défaut)
        run: cargo clippy --workspace --all-targets --release -- -D warnings
      - name: clippy (toutes features)
        run: cargo clippy --workspace --all-targets --release --all-features -- -D warnings

      # L'invariant que CLAUDE.md énonce : aucune feature de dev activée par une
      # arête de dépendance dans le build par défaut.
      - name: invariant des features
        run: |
          if cargo tree -e features --workspace | grep -E 'feature "dev-(transparent|circuits)"'; then
            echo "::error::une feature de dev est active dans le build par défaut"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # UNE seule passe, en --all-features : c'est le sur-ensemble. La surface
      # consensus seule est déjà vérifiée par `clippy (défaut)` et par le job
      # d'invariant ci-dessus, qui coûtent une fraction du temps.
      # --release : les preuves STARK sont gatées release (tests #[ignore] en debug).
      - run: cargo test --workspace --release --all-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses
