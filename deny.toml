# cargo-deny — plan Testnet 0, T0.2. Deux contrôles : les avis RUSTSEC et les
# licences des dépendances.

[advisories]
version = 2
yanked = "deny"
# ⚠️ TOUTE LA FAMILLE pqcrypto EST « unmaintained » — PQClean est ARCHIVÉ en amont.
#
# La migration FIPS (T1) a DÉPLACÉ cette dette, elle ne l'a pas supprimée : les
# crates ML-KEM/ML-DSA portent leurs propres avis (2026-0161/0166), au même titre
# que les round-3 qu'elles remplacent. Les avis sont donc ignorés PAR LEUR NOM,
# avec leur raison — jamais par un filtre large qui masquerait une VRAIE
# vulnérabilité de la même famille.
#
# ⚠️ DETTE OUVERTE, à trancher avant le mainnet : la sortie propre est un backend
# hors famille pqcrypto (RustCrypto `ml-kem`/`ml-dsa`, libcrux, aws-lc-rs…). Ce
# n'est PAS un simple changement d'import — c'est le même travail que T1, avec la
# même discipline de version d'algo.
ignore = [
    { id = "RUSTSEC-2026-0161", reason = "pqcrypto-mlkem : PQClean archivé en amont — dette de backend, cf. en-tête" },
    { id = "RUSTSEC-2026-0166", reason = "pqcrypto-mldsa : PQClean archivé en amont — dette de backend, cf. en-tête" },
    { id = "RUSTSEC-2026-0162", reason = "pqcrypto-traits : PQClean archivé en amont — dette de backend" },
    { id = "RUSTSEC-2026-0163", reason = "pqcrypto-internals : PQClean archivé en amont — dette de backend" },
    # `paste` (macro d'assemblage d'identifiants) est tiré par pqcrypto-mldsa. Non
    # cryptographique, sans exécution à l'exécution — il disparaîtra avec le
    # changement de backend ci-dessus.
    { id = "RUSTSEC-2024-0436", reason = "paste : macro non maintenue, tirée par pqcrypto-mldsa — part avec le backend" },
]

[licenses]
version = 2
# Nos crates ne sont PAS publiés (publish = false) et n'ont pas encore de champ
# `license` : en choisir une est une décision de l'utilisateur, pas de la CI.
# Nos crates declarent desormais « MIT OR Apache-2.0 » : plus besoin d ignorer
# les crates prives, deny verifie la licence comme pour les dependances.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
]
